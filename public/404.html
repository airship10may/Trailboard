<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      (function () {
        var repo = (location.pathname.split("/")[1] || "").trim();
        var base = repo ? "/" + repo + "/" : "/";
        location.replace(location.origin + base);
      })();
    </script>
  </body>
</html>
