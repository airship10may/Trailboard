name: Codex Task
description: Codex向けタスク（1 issue = 1 PR）
title: "[Trailboard] "
labels: ["codex"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 目的
      description: どのような成果を求めますか？
      placeholder: "例: タイトル/タグでカードを絞り込める検索ボックスを追加する。"
    validations:
      required: true

  - type: textarea
    id: ac
    attributes:
      label: 受け入れ条件
      description: 満たすべき具体的な条件。
      placeholder: |
        - 入力すると即時にカードが絞り込まれる
        - 新しい依存は追加しない
        - ビルドが通る
    validations:
      required: true

  - type: textarea
    id: oos
    attributes:
      label: スコープ外
      description: 対象外とする内容を明示する。
      placeholder: "例: バックエンドなし、永続化なし、デザイン全面改修なし。"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: ヒント、制約、関連リンクなど。
      placeholder: "任意"
    validations:
      required: false
